<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>OBS Receiver 1080p - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; width: 1920px; height: 1080px; font-family: sans-serif; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; background: rgba(0,0,0,0.95); padding: 40px; border-radius: 30px; border: 2px solid #444; }
        video { width: 1920px; height: 1080px; object-fit: cover; background: black; display: none; }
        #qr-code { display: flex; justify-content: center; background: white; padding: 20px; border-radius: 15px; width: 450px; height: 450px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="setup">
        <div id="qr-code"></div>
        <h2 id="msg" style="margin-top: 20px; font-size: 28px;">QUÉT ĐỂ TRUYỀN HÌNH</h2>
        <p id="peer-id-display" style="color: #888; font-size: 14px;">Đang kết nối server tin cậy...</p>
    </div>
    <video id="remote-video" autoplay playsinline></video>

    <script>
        // Bổ sung cấu hình ICE Servers để hỗ trợ card mạng LAN (Ethernet)
        const peer = new Peer('obs-' + Math.floor(Math.random() * 99999), {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true,
            debug: 3,
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });

        const video = document.getElementById('remote-video');
        const setup = document.getElementById('setup');
        const msg = document.getElementById('msg');
        const peerDisplay = document.getElementById('peer-id-display');

        peer.on('open', (id) => {
            peerDisplay.innerText = "ID SẴN SÀNG: " + id;
            let currentUrl = window.location.href.split('?')[0].replace('obs.html', 'phone.html');
            document.getElementById("qr-code").innerHTML = "";
            new QRCode(document.getElementById("qr-code"), { 
                text: currentUrl + "?join=" + id, 
                width: 450, height: 450 
            });
        });

        peer.on('call', (call) => {
            msg.innerText = "ĐANG KẾT NỐI...";
            call.answer(); 
            call.on('stream', (stream) => {
                setup.style.display = 'none';
                video.style.display = 'block';
                video.srcObject = stream;
                video.play().catch(e => console.log("Lỗi tự chạy:", e));
            });
        });

        peer.on('error', (err) => {
            console.error("Lỗi chi tiết:", err.type);
            if(err.type === 'network') {
                peerDisplay.innerText = "LỖI MẠNG: Vui lòng kiểm tra tường lửa card LAN hoặc NAT của Modem.";
            } else {
                peerDisplay.innerText = "Lỗi: " + err.type;
            }
        });
    </script>
</body>
</html>
