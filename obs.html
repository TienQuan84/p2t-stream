<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>OBS Receiver 1080p</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.1/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; width: 1920px; height: 1080px; font-family: sans-serif; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 30px; border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        video { width: 1920px; height: 1080px; object-fit: cover; background: black; display: none; }
        #qr-code { display: flex; justify-content: center; background: white; padding: 20px; border-radius: 15px; min-height: 450px; min-width: 450px; }
    </style>
</head>
<body>
    <div id="setup">
        <div id="qr-code"></div>
        <h2 id="msg" style="margin-top: 20px; font-size: 28px;">QUÉT ĐỂ TRUYỀN HÌNH</h2>
        <p id="peer-id-display" style="color: #888; font-size: 14px;">Đang kết nối server...</p>
    </div>
    <video id="remote-video" autoplay playsinline></video>

    <script>
        // Cấu hình tối giản để tránh lỗi Network trên một số đường truyền
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        const video = document.getElementById('remote-video');
        const setup = document.getElementById('setup');
        const msg = document.getElementById('msg');
        const peerDisplay = document.getElementById('peer-id-display');

        peer.on('open', (id) => {
            peerDisplay.innerText = "ID: " + id;
            
            // Xây dựng đường dẫn phone.html chuẩn từ GitHub Pages
            let currentUrl = window.location.href.split('?')[0];
            if (currentUrl.endsWith('obs.html')) {
                currentUrl = currentUrl.replace('obs.html', 'phone.html');
            } else {
                currentUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1) + 'phone.html';
            }

            document.getElementById("qr-code").innerHTML = "";
            new QRCode(document.getElementById("qr-code"), { 
                text: currentUrl + "?join=" + id, 
                width: 450, height: 450
            });
        });

        peer.on('call', (call) => {
            msg.innerText = "ĐANG NHẬN TÍN HIỆU...";
            call.answer(); 
            call.on('stream', (stream) => {
                setup.style.display = 'none';
                video.style.display = 'block';
                video.srcObject = stream;
                video.play().catch(() => {
                    msg.innerText = "NHẤN VÀO MÀN HÌNH ĐỂ XEM";
                    setup.style.display = 'block';
                });
            });
        });

        peer.on('error', (err) => {
            console.error("Lỗi:", err.type);
            peerDisplay.innerText = "Lỗi: " + err.type + ". Vui lòng F5 trang.";
        });
    </script>
</body>
</html>
