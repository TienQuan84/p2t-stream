<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>OBS Receiver 1080p</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; width: 1920px; height: 1080px; font-family: sans-serif; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; background: rgba(0,0,0,0.95); padding: 40px; border-radius: 30px; border: 2px solid #444; }
        video { width: 1920px; height: 1080px; object-fit: cover; background: black; display: none; }
        #qr-code { display: flex; justify-content: center; background: white; padding: 20px; border-radius: 15px; min-height: 450px; min-width: 450px; }
    </style>
</head>
<body>
    <div id="setup">
        <div id="qr-code"></div>
        <h2 id="msg" style="margin-top: 20px; font-size: 28px;">QUÉT ĐỂ TRUYỀN HÌNH</h2>
        <p id="peer-id-display" style="color: #888; font-size: 14px;">Đang khởi tạo tín hiệu...</p>
    </div>
    <video id="remote-video" autoplay playsinline></video>

    <script>
        // Khởi tạo PeerJS với server STUN/TURN để chạy được ngoài mạng LAN
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { 
                        urls: 'turn:openrelay.metered.ca:443', 
                        username: 'openrelayproject', 
                        credential: 'openrelayproject' 
                    }
                ]
            }
        });

        const video = document.getElementById('remote-video');
        const setup = document.getElementById('setup');
        const msg = document.getElementById('msg');
        const peerDisplay = document.getElementById('peer-id-display');

        peer.on('open', (id) => {
            console.log("Peer ID của bạn là: " + id);
            peerDisplay.innerText = "ID: " + id;
            
            // Tự động tạo link dẫn đến file phone.html dựa trên URL hiện tại
            let currentUrl = window.location.href.split('?')[0];
            if (currentUrl.endsWith('obs.html')) {
                currentUrl = currentUrl.replace('obs.html', 'phone.html');
            } else if (currentUrl.endsWith('/')) {
                currentUrl = currentUrl + 'phone.html';
            } else {
                currentUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1) + 'phone.html';
            }

            // Xóa mã QR cũ nếu có và tạo mới
            document.getElementById("qr-code").innerHTML = "";
            new QRCode(document.getElementById("qr-code"), { 
                text: currentUrl + "?join=" + id, 
                width: 450, 
                height: 450,
                correctLevel: QRCode.CorrectLevel.H 
            });
        });

        peer.on('call', (call) => {
            msg.innerText = "ĐANG KẾT NỐI...";
            call.answer(); // Trả lời cuộc gọi từ điện thoại
            
            call.on('stream', (stream) => {
                setup.style.display = 'none';
                video.style.display = 'block';
                video.srcObject = stream;
                // Thêm tương tác để tránh bị trình duyệt chặn Auto-play
                video.play().catch(e => {
                    console.log("Auto-play bị chặn, đang thử lại...", e);
                    msg.innerText = "NHẤN VÀO MÀN HÌNH ĐỂ XEM";
                    setup.style.display = 'block';
                });
            });
        });

        peer.on('error', (err) => {
            console.error("Lỗi PeerJS:", err.type);
            peerDisplay.innerText = "Lỗi kết nối: " + err.type;
        });
    </script>
</body>
</html>
