<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>OBS Receiver 1080p - Ultra Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; width: 1920px; height: 1080px; font-family: sans-serif; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; background: rgba(20,20,20,0.9); padding: 40px; border-radius: 20px; border: 1px solid #333; z-index: 10; }
        video { width: 1920px; height: 1080px; object-fit: cover; display: none; background: #000; }
        #qr-code { display: flex; justify-content: center; background: white; padding: 15px; border-radius: 10px; width: 400px; height: 400px; margin: 0 auto; }
        #audio-status { position: absolute; bottom: 10px; left: 10px; color: #555; font-size: 12px; z-index: 5; }
    </style>
</head>
<body>
    <div id="setup">
        <div id="qr-code"></div>
        <h2 id="msg" style="margin-top: 20px;">QUÉT ĐỂ TRUYỀN HÌNH</h2>
        <p id="peer-id-display" style="color: #aaa;">Đang khởi tạo...</p>
    </div>
    
    <video id="remote-video" autoplay playsinline></video>
    <div id="audio-status">Audio: Auto-detecting...</div>

    <script>
        const video = document.getElementById('remote-video');
        const setup = document.getElementById('setup');
        const msg = document.getElementById('msg');
        const peerDisplay = document.getElementById('peer-id-display');

        const peer = new Peer('obs-' + Math.floor(Math.random() * 9999), {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true,
            debug: 1, // Giảm debug xuống 1 để tránh tràn log gây treo máy
            config: {
                'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }],
                'sdpSemantics': 'unified-plan'
            }
        });

        peer.on('open', (id) => {
            peerDisplay.innerText = "ID: " + id;
            let currentUrl = window.location.href.split('?')[0].replace('obs.html', 'phone.html');
            new QRCode(document.getElementById("qr-code"), { text: currentUrl + "?join=" + id, width: 400, height: 400 });
        });

        peer.on('call', (call) => {
            msg.innerText = "KẾT NỐI THÀNH CÔNG!";
            call.answer(); 
            
            call.on('stream', (stream) => {
                setup.style.display = 'none';
                video.style.display = 'block';
                video.srcObject = stream;
                
                // Mẹo nhỏ: Bật âm thanh sau khi luồng đã sẵn sàng
                video.onloadedmetadata = () => {
                    video.muted = false; // Bật mic
                    video.play().catch(() => {
                        // Nếu trình duyệt chặn, ép buộc chạy bằng tương tác ảo hoặc đợi OBS kích hoạt
                        console.log("OBS sẽ tự kích hoạt Audio qua Browser Source");
                    });
                };
            });
        });

        // Xử lý lỗi để tránh treo tab trình duyệt
        peer.on('error', (err) => {
            console.error(err);
            peerDisplay.innerText = "Lỗi: " + err.type;
            if(err.type === 'network') location.reload(); // Tự reset nếu mất mạng LAN
        });
    </script>
</body>
</html>
