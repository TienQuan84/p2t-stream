<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phone Transmitter - 1080p + Mic</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { width: 90%; border-radius: 15px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; text-align: center; }
        .btn { background: #2ecc71; border: none; padding: 15px 30px; color: white; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #27ae60; }
        #status { margin-top: 15px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <video id="local-video" autoplay playsinline muted></video>
    
    <div class="controls">
        <button id="start-btn" class="btn">BẮT ĐẦU TRUYỀN (MIC + VIDEO)</button>
        <div id="status">Chưa kết nối</div>
    </div>

    <script>
        const statusDisp = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const localVideo = document.getElementById('local-video');

        // Lấy ID từ URL (được tạo từ QR Code)
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');

        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true,
            debug: 1,
            config: {
                'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]
            }
        });

        startBtn.onclick = async () => {
            if (!joinId) {
                alert("Không tìm thấy ID đích. Hãy quét lại mã QR!");
                return;
            }

            try {
                statusDisp.innerText = "Đang xin quyền Camera & Mic...";
                
                // Cấu hình 1080p và lấy Audio
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        facingMode: "environment", // Sử dụng camera sau
                        frameRate: { ideal: 30 }
                    },
                    audio: true // QUAN TRỌNG: Cho phép gửi Mic
                });

                localVideo.srcObject = stream;
                statusDisp.innerText = "Đang gọi tới OBS...";

                // Thực hiện cuộc gọi tới ID của OBS
                const call = peer.call(joinId, stream);
                
                call.on('stream', () => {
                    statusDisp.innerText = "ĐANG TRUYỀN TÍN HIỆU...";
                    startBtn.style.background = "#e74c3c";
                    startBtn.innerText = "ĐANG TRUYỀN (1080p)";
                });

                // Xử lý khi kết nối bị ngắt
                call.on('close', () => {
                    alert("Kết nối đã đóng");
                    location.reload();
                });

            } catch (err) {
                console.error(err);
                statusDisp.innerText = "Lỗi: " + err.message;
                alert("Không thể truy cập Camera/Mic. Hãy đảm bảo bạn dùng HTTPS.");
            }
        };

        peer.on('error', (err) => {
            console.error(err);
            statusDisp.innerText = "Lỗi Peer: " + err.type;
        });
    </script>
</body>
</html>
